name: Enterprise Readiness

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run enterprise readiness check
        run: bash scripts/enterprise-readiness-check.sh
