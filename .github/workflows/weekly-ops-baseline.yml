name: Weekly Ops Baseline

on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

jobs:
  ops-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep dnsutils
      - name: Run week 1-2 baseline checks
        run: bash scripts/week1-2-baseline-check.sh
