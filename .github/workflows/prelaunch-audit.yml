name: Prelaunch Audit

on:
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run quality check
        run: bash scripts/quality-check.sh
      - name: Run prelaunch audit
        run: bash scripts/prelaunch-check.sh
