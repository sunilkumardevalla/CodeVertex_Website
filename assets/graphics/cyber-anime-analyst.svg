<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Animated cyber analyst character">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0d6ed1"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f8cf4"/>
      <stop offset="100%" stop-color="#0b3ea8"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.22" stroke="#9dd6ff" stroke-width="2" fill="none">
    <path d="M0 130h1200"/><path d="M0 260h1200"/><path d="M0 390h1200"/><path d="M0 520h1200"/><path d="M0 650h1200"/>
    <path d="M160 0v800"/><path d="M320 0v800"/><path d="M480 0v800"/><path d="M640 0v800"/><path d="M800 0v800"/><path d="M960 0v800"/>
  </g>
  <g transform="translate(560 170)">
    <ellipse cx="70" cy="94" rx="60" ry="74" fill="#ffd7bc"/>
    <path d="M10 93q55-94 120-9q-10-74-61-88q-47 12-59 97z" fill="url(#hair)">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="M10 93q55-94 120-9q-10-74-61-88q-47 12-59 97z;M9 95q58-97 120-11q-11-73-61-89q-48 14-59 100z;M10 93q55-94 120-9q-10-74-61-88q-47 12-59 97z"/>
    </path>
    <circle cx="46" cy="94" r="8" fill="#0f172a"/>
    <circle cx="93" cy="94" r="8" fill="#0f172a"/>
    <path d="M47 132q24 18 47 0" stroke="#a55353" stroke-width="4" fill="none" stroke-linecap="round"/>
    <rect x="-18" y="172" width="176" height="190" rx="22" fill="#0a2540"/>
    <rect x="9" y="205" width="126" height="84" rx="10" fill="#0f3f6a"/>
    <g filter="url(#glow)">
      <rect x="20" y="220" width="104" height="8" rx="4" fill="#5dd3ff">
        <animate attributeName="width" values="36;104;50;104;36" dur="3.2s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="239" width="82" height="8" rx="4" fill="#94f3f0">
        <animate attributeName="x" values="20;44;20" dur="2.8s" repeatCount="indefinite"/>
      </rect>
      <rect x="20" y="258" width="96" height="8" rx="4" fill="#6dc8ff">
        <animate attributeName="opacity" values="1;.4;1" dur="2.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  <g transform="translate(120 560)">
    <rect x="0" y="0" width="960" height="130" rx="16" fill="#03162a" opacity=".75"/>
    <text x="34" y="55" fill="#9ad2ff" font-family="Sora, sans-serif" font-size="32">Threat Briefing</text>
    <text x="34" y="95" fill="#d7efff" font-family="IBM Plex Sans, sans-serif" font-size="24">Analyst-led incident narrative with executive context</text>
  </g>
</svg>
